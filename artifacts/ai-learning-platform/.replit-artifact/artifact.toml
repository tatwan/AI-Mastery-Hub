kind = "web"
previewPath = "/"
title = "AI & ML Learning Platform"
version = "1.0.0"
id = "artifacts/ai-learning-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25197
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-learning-platform run dev"

[services.env]
PORT = "25197"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-learning-platform", "run", "build"]
publicDir = "artifacts/ai-learning-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
